<!DOCTYPE html>
<html>
<head>
  <title>COSADE 2022 Sponsors</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="slick/slick.css">
  <link rel="stylesheet" type="text/css" href="slick/slick-theme.css">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
    }

    * {
      box-sizing: border-box;
    }

    .slider {
        width: 50%;
        margin: 100px auto;
    }

    .slick-slide {
      margin: 0px 20px;
    }

    .slick-slide img {
      width: 100%;
    }

    .slick-prev:before,
    .slick-next:before {
      color: black;
    }

    .slick-slide {
      transition: all ease-in-out .3s;
      opacity: .2;
    }
    
    .slick-active {
      opacity: .5;
    }

    .slick-current {
      opacity: 1;
    }
  </style>
</head>
<body>

  <section class="regular slider">

    <div>
      <img src="sponsors/riscure.svg">
    </div>
    
    <div>
      <img src="sponsors/secure-ic.svg">
    </div>

    <div>    
      <img src="sponsors/newae.svg">
    </div>

    <div>
      <img src="sponsors/eshard.svg">
    </div>

    <div>
      <img src="sponsors/alphanov.svg">
    </div>

    <div>
      <img src="sponsors/pq-shield.svg">
    </div>

    <div>
      <img src="sponsors/rambus.svg">
    </div>

    <div>
      <img src="sponsors/texplained.svg">
    </div>

    <div>
      <img src="sponsors/nxp.svg">
    </div>

  </section>

  <script src="https://code.jquery.com/jquery-2.2.0.min.js" type="text/javascript"></script>
  <script src="slick/slick.js" type="text/javascript" charset="utf-8"></script>
  <script type="text/javascript">
    $(document).on('ready', function() {
      $(".regular").slick({
        dots: true,
        infinite: true,
        speed: 300,
        slidesToShow: 1,
        autoplay: true,
        autoplaySpeed: 4000
      });
    });
</script>

</body>
</html>
